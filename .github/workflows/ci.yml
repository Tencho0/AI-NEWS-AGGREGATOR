name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Newsroom.slnx

      - name: Build
        run: dotnet build Newsroom.slnx --no-restore -c Release -warnaserror

      - name: Test
        run: dotnet test Newsroom.slnx --no-build -c Release --logger "console;verbosity=normal"
